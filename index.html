<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>AWG Capture</title>
<link rel="manifest" href="manifest.json">
<!-- Vision AI replaces Tesseract -->
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--accent:#e94560;--accent2:#0f3460;--text:#eee;--text2:#aab;--green:#00b894;--blue:#4dabf7;--border:#2a2a4a;--radius:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;padding-bottom:80px}

/* Header - minimal */
.header{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header h1{font-size:1.1rem;color:#fff}
.header .count-badge{background:var(--accent);color:#fff;font-size:.7rem;padding:3px 10px;border-radius:20px;font-weight:700}

/* Big capture button */
.capture-zone{padding:16px}
.capture-btn-big{width:100%;padding:20px;border-radius:var(--radius);border:2px dashed var(--border);background:var(--card);color:var(--text);font-size:1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.capture-btn-big:active{transform:scale(.97);border-color:var(--accent)}
.capture-btn-big .ico{font-size:1.8rem}
.capture-actions{display:flex;gap:10px;margin-top:10px}
.capture-actions button{flex:1;padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.85rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.capture-actions button:active{transform:scale(.97)}
.capture-actions .btn-card{border-color:var(--blue);color:var(--blue)}
.capture-actions .btn-flyer{border-color:#c084fc;color:#c084fc}
.capture-actions .btn-note{border-color:var(--green);color:var(--green)}

/* Hidden file input */
.hidden-input{display:none}

/* Card list */
.cards-list{padding:0 16px}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px}
.section-header h2{font-size:.95rem;color:var(--text2)}
.section-header .export-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:10px;font-size:.72rem;cursor:pointer}

.capture-card{background:var(--card);border-radius:var(--radius);margin-bottom:10px;border:1px solid var(--border);overflow:hidden}
.capture-card .card-image{width:100%;max-height:200px;object-fit:cover;display:block}
.capture-card .card-body{padding:12px}
.capture-card .card-type{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:700;display:inline-block;margin-bottom:6px}
.type-card{background:#1e3a5f;color:var(--blue)}
.type-flyer{background:#3a1e3f;color:#c084fc}
.type-note{background:#1e3a2f;color:var(--green)}
.capture-card .card-name{font-weight:700;font-size:1rem;margin-bottom:2px}
.capture-card .card-title{color:var(--text2);font-size:.8rem;margin-bottom:4px}
.capture-card .card-company{color:var(--blue);font-size:.85rem;font-weight:600;margin-bottom:6px}
.capture-card .card-detail{font-size:.82rem;color:var(--text);margin:2px 0;display:flex;align-items:center;gap:6px}
.capture-card .card-detail a{color:var(--blue);text-decoration:none}
.capture-card .card-notes{color:var(--text2);font-size:.8rem;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.capture-card .card-time{color:var(--text2);font-size:.68rem;margin-top:6px}
.capture-card .card-actions{display:flex;gap:8px;margin-top:8px}
.capture-card .card-actions button{flex:1;padding:7px;border-radius:8px;border:none;font-size:.75rem;font-weight:600;cursor:pointer}
.btn-edit{background:#1e3a5f;color:var(--blue)}
.btn-del{background:#3a1e1e;color:var(--accent)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.modal h2{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:1rem}
.modal .close-btn{background:none;border:none;color:var(--text2);font-size:1.5rem;cursor:pointer;padding:4px}
.modal label{display:block;color:var(--text2);font-size:.75rem;margin:10px 0 4px;font-weight:500}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9rem;outline:none}
.modal textarea{min-height:70px;resize:vertical}
.modal .save-btn{width:100%;padding:12px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:14px}
.modal .save-btn:active{opacity:.8}
.modal .save-btn:disabled{opacity:.5}
.modal .preview-img{width:100%;border-radius:10px;margin:8px 0;max-height:180px;object-fit:cover}

/* Processing indicator */
.processing{padding:10px;border-radius:10px;text-align:center;font-size:.82rem;margin:8px 0}
.processing.scanning{background:rgba(77,171,247,.12);color:var(--blue)}
.processing.done{background:rgba(0,184,148,.12);color:var(--green)}
.processing.error{background:rgba(233,69,96,.12);color:var(--accent)}

/* Search */
.search-bar{padding:0 16px 8px}
.search-bar input{width:100%;padding:10px 14px 10px 36px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.85rem;outline:none}
.search-bar .icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text2)}
.search-bar{position:relative}

/* Filter tabs */
.filter-row{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-row button{flex-shrink:0;padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:.75rem;cursor:pointer;font-weight:500}
.filter-row button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Empty */
.empty{text-align:center;padding:50px 20px;color:var(--text2)}
.empty .ico{font-size:3.5rem;margin-bottom:14px}
.empty .sub{font-size:.8rem;margin-top:8px}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav button{flex:1;padding:10px 0 6px;background:none;border:none;color:var(--text2);font-size:.62rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.bottom-nav button .ico{font-size:1.3rem}
.bottom-nav button.active{color:var(--accent)}

.hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <h1>📸 AWG Capture</h1>
  <span class="count-badge" id="countBadge">0 captured</span>
</div>

<!-- Main capture zone -->
<div class="capture-zone" id="captureZone">
  <div class="capture-actions">
    <button class="btn-card" onclick="startCapture('card')">📇 Business Card</button>
    <button class="btn-flyer" onclick="startCapture('flyer')">📄 Flyer / Doc</button>
    <button class="btn-note" onclick="startCapture('note')">📝 Quick Note</button>
  </div>
</div>

<!-- Search & filter -->
<div class="search-bar" id="searchBar">
  <span class="icon">🔍</span>
  <input type="text" id="searchInput" placeholder="Search captures..." autocomplete="off">
</div>
<div class="filter-row" id="filterRow">
  <button class="active" data-filter="all">All</button>
  <button data-filter="card">📇 Cards</button>
  <button data-filter="flyer">📄 Flyers</button>
  <button data-filter="note">📝 Notes</button>
</div>

<!-- Cards list -->
<div class="cards-list" id="cardsList"></div>

<!-- Hidden file inputs -->
<input type="file" class="hidden-input" id="cameraInput" accept="image/*" capture="environment">
<input type="file" class="hidden-input" id="galleryInput" accept="image/*">

<!-- Capture modal (card/flyer) -->
<div class="modal-overlay" id="captureModal">
  <div class="modal">
    <h2><span id="modalTitle">📇 New Card</span><button class="close-btn" onclick="closeModal()">&times;</button></h2>
    <img class="preview-img hidden" id="previewImg">
    <div id="ocrStatus"></div>
    
    <!-- Card fields -->
    <div id="cardFields">
      <label>Name</label>
      <input type="text" id="fName" placeholder="Contact name">
      <label>Title</label>
      <input type="text" id="fTitle" placeholder="Job title">
      <label>Company</label>
      <input type="text" id="fCompany" placeholder="Company">
      <label>Phone</label>
      <input type="tel" id="fPhone" placeholder="Phone">
      <label>Email</label>
      <input type="email" id="fEmail" placeholder="Email">
      <label>Address</label>
      <input type="text" id="fAddress" placeholder="Address">
      <label>Website</label>
      <input type="text" id="fWeb" placeholder="Website">
    </div>

    <!-- Flyer fields -->
    <div id="flyerFields" class="hidden">
      <label>Title</label>
      <input type="text" id="fFlyerTitle" placeholder="What is this?">
      <label>Key Details</label>
      <textarea id="fFlyerNotes" placeholder="Pricing, offers, key info..."></textarea>
    </div>

    <!-- Note fields -->
    <div id="noteFields" class="hidden">
      <label>Booth / Company (optional)</label>
      <input type="text" id="fNoteBooth" placeholder="Who was this about?">
      <label>Notes</label>
      <textarea id="fNoteText" placeholder="What do you want to remember?" style="min-height:120px"></textarea>
    </div>

    <label>Tags (optional)</label>
    <input type="text" id="fTags" placeholder="e.g. refrigeration, follow-up, pricing">

    <div style="color:var(--text2);font-size:.72rem;text-align:center;margin-top:10px">📸 Photo is always saved — fill in what you can, skip the rest</div>
    <button class="save-btn" id="saveBtn" onclick="saveCapture()">💾 Save Capture</button>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2><span>✏️ Edit</span><button class="close-btn" onclick="closeEdit()">&times;</button></h2>
    <img class="preview-img hidden" id="editPreviewImg">
    <div id="editFields"></div>
    <button class="save-btn" onclick="saveEdit()">💾 Update</button>
  </div>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <button class="active" data-view="captures"><span class="ico">📸</span>Captures</button>
  <button data-view="exhibitors"><span class="ico">🏪</span>Exhibitors</button>
  <button data-view="schedule"><span class="ico">📅</span>Schedule</button>
</div>

<script>
// === STATE ===
let captures = JSON.parse(localStorage.getItem('awg_captures2')||'[]');
let currentFilter = 'all';
let searchQuery = '';
let currentView = 'captures';
let captureType = 'card';
let captureImage = '';
let editIdx = -1;

function save(){localStorage.setItem('awg_captures2',JSON.stringify(captures))}

// === CAPTURE FLOW ===
function startCapture(type){
  captureType = type;
  captureImage = '';
  
  if(type === 'note'){
    openModal(type, null);
    return;
  }
  
  // On iOS, using capture="environment" forces camera only.
  // Create a fresh input each time to avoid iOS caching issues
  const existing = document.getElementById('cameraInput');
  const fresh = existing.cloneNode(true);
  existing.parentNode.replaceChild(fresh, existing);
  
  fresh.onchange = function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      captureImage = ev.target.result;
      openModal(type, captureImage);
    };
    reader.readAsDataURL(file);
  };
  
  // Small delay for iOS
  setTimeout(() => fresh.click(), 100);
}

function openModal(type, imageData){
  const modal = document.getElementById('captureModal');
  const img = document.getElementById('previewImg');
  
  // Reset
  document.getElementById('cardFields').classList.toggle('hidden', type !== 'card');
  document.getElementById('flyerFields').classList.toggle('hidden', type !== 'flyer');
  document.getElementById('noteFields').classList.toggle('hidden', type !== 'note');
  document.getElementById('ocrStatus').innerHTML = '';
  document.getElementById('fTags').value = '';
  
  if(type === 'card'){
    document.getElementById('modalTitle').textContent = '📇 New Business Card';
    document.getElementById('fName').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fCompany').value = '';
    document.getElementById('fPhone').value = '';
    document.getElementById('fEmail').value = '';
    document.getElementById('fAddress').value = '';
    document.getElementById('fWeb').value = '';
  } else if(type === 'flyer'){
    document.getElementById('modalTitle').textContent = '📄 New Flyer';
    document.getElementById('fFlyerTitle').value = '';
    document.getElementById('fFlyerNotes').value = '';
  } else {
    document.getElementById('modalTitle').textContent = '📝 Quick Note';
    document.getElementById('fNoteBooth').value = '';
    document.getElementById('fNoteText').value = '';
  }
  
  if(imageData){
    img.src = imageData;
    img.classList.remove('hidden');
  } else {
    img.classList.add('hidden');
  }
  
  modal.classList.add('show');
  
  // Auto-OCR if image
  if(imageData && (type === 'card' || type === 'flyer')){
    runOCR(imageData, type);
  }
}

function closeModal(){
  document.getElementById('captureModal').classList.remove('show');
}

// === VISION AI PARSING ===
async function runOCR(imageData, type){
  const status = document.getElementById('ocrStatus');
  status.innerHTML = '<div class="processing scanning">🤖 AI reading card...</div>';
  
  try {
    // Compress image if too large (keep under 1MB for fast upload)
    const compressed = await compressImage(imageData, 800);
    
    const resp = await fetch('/api/parse-card', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: compressed, type: type })
    });
    
    if(!resp.ok) throw new Error('API returned ' + resp.status);
    
    const result = await resp.json();
    
    if(result.ok && result.data){
      const d = result.data;
      if(type === 'card'){
        if(d.name) document.getElementById('fName').value = d.name;
        if(d.title) document.getElementById('fTitle').value = d.title;
        if(d.company) document.getElementById('fCompany').value = d.company;
        if(d.phone) document.getElementById('fPhone').value = d.phone;
        if(d.email) document.getElementById('fEmail').value = d.email;
        if(d.address) document.getElementById('fAddress').value = d.address;
        if(d.web) document.getElementById('fWeb').value = d.web;
        status.innerHTML = '<div class="processing done">✅ Card parsed by AI — review below</div>';
      } else {
        if(d.title) document.getElementById('fFlyerTitle').value = d.title;
        if(d.notes) document.getElementById('fFlyerNotes').value = d.notes;
        status.innerHTML = '<div class="processing done">✅ Text extracted — review below</div>';
      }
    } else {
      throw new Error(result.error || 'Parse failed');
    }
  } catch(e){
    console.error('Vision API error:', e);
    status.innerHTML = '<div class="processing error">⚠️ AI parse failed — fill in manually. Photo is saved either way.</div>';
  }
}

function compressImage(dataUrl, maxWidth){
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if(w > maxWidth){
        h = Math.round(h * maxWidth / w);
        w = maxWidth;
      }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });
}

// Card/flyer parsing now handled server-side by Vision AI

// === SAVE ===
function saveCapture(){
  const entry = {
    type: captureType,
    image: captureImage,
    tags: document.getElementById('fTags').value,
    ts: Date.now(),
    date: new Date().toLocaleDateString()
  };
  
  if(captureType === 'card'){
    entry.name = document.getElementById('fName').value;
    entry.title = document.getElementById('fTitle').value;
    entry.company = document.getElementById('fCompany').value;
    entry.phone = document.getElementById('fPhone').value;
    entry.email = document.getElementById('fEmail').value;
    entry.address = document.getElementById('fAddress').value;
    entry.web = document.getElementById('fWeb').value;
  } else if(captureType === 'flyer'){
    entry.flyerTitle = document.getElementById('fFlyerTitle').value;
    entry.notes = document.getElementById('fFlyerNotes').value;
  } else {
    entry.booth = document.getElementById('fNoteBooth').value;
    entry.notes = document.getElementById('fNoteText').value;
  }
  
  captures.unshift(entry); // newest first
  save();
  closeModal();
  render();
}

// === RENDER ===
function render(){
  document.getElementById('countBadge').textContent = captures.length + ' captured';
  
  if(currentView === 'captures') renderCaptures();
  else if(currentView === 'exhibitors') renderExhibitors();
  else if(currentView === 'schedule') renderSchedule();
}

function renderCaptures(){
  document.getElementById('captureZone').classList.remove('hidden');
  document.getElementById('searchBar').classList.remove('hidden');
  document.getElementById('filterRow').classList.remove('hidden');
  
  const list = document.getElementById('cardsList');
  let filtered = captures;
  
  if(currentFilter !== 'all') filtered = filtered.filter(c => c.type === currentFilter);
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(c => {
      const text = [c.name,c.company,c.title,c.phone,c.email,c.booth,c.flyerTitle,c.notes,c.tags].filter(Boolean).join(' ').toLowerCase();
      return text.includes(q);
    });
  }
  
  if(filtered.length === 0){
    list.innerHTML = `<div class="empty">
      <div class="ico">${captures.length === 0 ? '📸' : '🔍'}</div>
      ${captures.length === 0 ? 'No captures yet<div class="sub">Tap a button above to snap your first card or flyer</div>' : 'No matches'}
    </div>`;
    return;
  }
  
  let html = '';
  filtered.forEach((c, i) => {
    const realIdx = captures.indexOf(c);
    html += `<div class="capture-card">`;
    if(c.image) html += `<img class="card-image" src="${c.image}" alt="capture">`;
    html += `<div class="card-body">`;
    
    if(c.type === 'card'){
      html += `<span class="card-type type-card">📇 Business Card</span>`;
      if(c.name) html += `<div class="card-name">${esc(c.name)}</div>`;
      if(c.title) html += `<div class="card-title">${esc(c.title)}</div>`;
      if(c.company) html += `<div class="card-company">${esc(c.company)}</div>`;
      if(c.phone) html += `<div class="card-detail">📞 <a href="tel:${c.phone.split('/')[0].trim()}">${esc(c.phone)}</a></div>`;
      if(c.email) html += `<div class="card-detail">✉️ <a href="mailto:${c.email}">${esc(c.email)}</a></div>`;
      if(c.address) html += `<div class="card-detail">📍 ${esc(c.address)}</div>`;
      if(c.web) html += `<div class="card-detail">🌐 <a href="https://${c.web}" target="_blank">${esc(c.web)}</a></div>`;
    } else if(c.type === 'flyer'){
      html += `<span class="card-type type-flyer">📄 Flyer</span>`;
      if(c.flyerTitle) html += `<div class="card-name">${esc(c.flyerTitle)}</div>`;
      if(c.notes) html += `<div class="card-notes">${esc(c.notes).substring(0,200)}${c.notes.length>200?'...':''}</div>`;
    } else {
      html += `<span class="card-type type-note">📝 Note</span>`;
      if(c.booth) html += `<div class="card-company">${esc(c.booth)}</div>`;
      if(c.notes) html += `<div class="card-notes">${esc(c.notes)}</div>`;
    }
    
    if(c.tags) html += `<div class="card-detail" style="margin-top:6px">🏷️ ${esc(c.tags)}</div>`;
    html += `<div class="card-time">${new Date(c.ts).toLocaleString()}</div>`;
    html += `<div class="card-actions">
      <button class="btn-edit" onclick="editCapture(${realIdx})">✏️ Edit</button>
      <button class="btn-del" onclick="deleteCapture(${realIdx})">🗑 Delete</button>
    </div>`;
    html += `</div></div>`;
  });
  
  // Export row
  if(filtered.length > 0){
    html += `<div style="display:flex;gap:8px;padding:10px 0 20px">
      <button onclick="exportData('csv')" style="flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.8rem;cursor:pointer">📄 Export CSV</button>
      <button onclick="exportData('json')" style="flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.8rem;cursor:pointer">📋 Export JSON</button>
    </div>`;
  }
  
  list.innerHTML = html;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// === EDIT ===
function editCapture(idx){
  editIdx = idx;
  const c = captures[idx];
  const modal = document.getElementById('editModal');
  const img = document.getElementById('editPreviewImg');
  const fields = document.getElementById('editFields');
  
  if(c.image){img.src=c.image;img.classList.remove('hidden')} else img.classList.add('hidden');
  
  let html = '';
  if(c.type === 'card'){
    html += `<label>Name</label><input id="e_name" value="${esc(c.name||'')}">`;
    html += `<label>Title</label><input id="e_title" value="${esc(c.title||'')}">`;
    html += `<label>Company</label><input id="e_company" value="${esc(c.company||'')}">`;
    html += `<label>Phone</label><input id="e_phone" value="${esc(c.phone||'')}">`;
    html += `<label>Email</label><input id="e_email" value="${esc(c.email||'')}">`;
    html += `<label>Address</label><input id="e_address" value="${esc(c.address||'')}">`;
    html += `<label>Website</label><input id="e_web" value="${esc(c.web||'')}">`;
  } else if(c.type === 'flyer'){
    html += `<label>Title</label><input id="e_flyerTitle" value="${esc(c.flyerTitle||'')}">`;
    html += `<label>Notes</label><textarea id="e_notes">${esc(c.notes||'')}</textarea>`;
  } else {
    html += `<label>Booth / Company</label><input id="e_booth" value="${esc(c.booth||'')}">`;
    html += `<label>Notes</label><textarea id="e_notes">${esc(c.notes||'')}</textarea>`;
  }
  html += `<label>Tags</label><input id="e_tags" value="${esc(c.tags||'')}">`;
  fields.innerHTML = html;
  modal.classList.add('show');
}

function saveEdit(){
  const c = captures[editIdx];
  if(c.type === 'card'){
    c.name = document.getElementById('e_name').value;
    c.title = document.getElementById('e_title').value;
    c.company = document.getElementById('e_company').value;
    c.phone = document.getElementById('e_phone').value;
    c.email = document.getElementById('e_email').value;
    c.address = document.getElementById('e_address').value;
    c.web = document.getElementById('e_web').value;
  } else if(c.type === 'flyer'){
    c.flyerTitle = document.getElementById('e_flyerTitle').value;
    c.notes = document.getElementById('e_notes').value;
  } else {
    c.booth = document.getElementById('e_booth').value;
    c.notes = document.getElementById('e_notes').value;
  }
  c.tags = document.getElementById('e_tags').value;
  save();
  closeEdit();
  render();
}

function closeEdit(){document.getElementById('editModal').classList.remove('show')}

function deleteCapture(idx){
  if(confirm('Delete this capture?')){
    captures.splice(idx,1);
    save();
    render();
  }
}

// === EXPORT ===
function exportData(format){
  if(!captures.length){alert('Nothing to export');return}
  let content,ext;
  if(format==='csv'){
    const rows=[['Type','Name','Title','Company','Phone','Email','Address','Website','Notes','Tags','Date']];
    captures.forEach(c=>rows.push([c.type,c.name||'',c.title||'',c.company||c.booth||'',c.phone||'',c.email||'',c.address||'',c.web||'',c.notes||c.flyerTitle||'',c.tags||'',new Date(c.ts).toISOString()]));
    content=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    ext='csv';
  } else {
    // Strip images for cleaner export
    const clean = captures.map(c=>{const copy={...c};delete copy.image;return copy});
    content=JSON.stringify(clean,null,2);
    ext='json';
  }
  const blob=new Blob([content],{type:format==='csv'?'text/csv':'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`awg-captures-${new Date().toISOString().slice(0,10)}.${ext}`;
  a.click();
}
