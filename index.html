<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>AWG Innovation Showcase 2026</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--accent:#e94560;--accent2:#0f3460;--text:#eee;--text2:#aab;--green:#00b894;--blue:#4dabf7;--border:#2a2a4a;--radius:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;-webkit-tap-highlight-color:transparent}
h1{font-size:1.3rem;font-weight:700}
h2{font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:12px}
h3{font-size:.95rem;font-weight:600;color:var(--blue)}

/* Header */
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:16px 16px 12px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.header h1{color:#fff;font-size:1.15rem}
.header .subtitle{color:var(--text2);font-size:.75rem}
.header .date-badge{background:var(--accent);color:#fff;font-size:.65rem;padding:3px 8px;border-radius:20px;font-weight:600}

/* Search */
.search-wrap{padding:10px 16px;position:sticky;top:68px;z-index:99;background:var(--bg)}
.search-wrap input{width:100%;padding:12px 16px 12px 40px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.95rem;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap .icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:1.1rem}

/* Nav tabs */
.nav{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s}
.nav button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Cards */
.content{padding:0 16px}
.card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border);transition:transform .15s}
.card:active{transform:scale(.98)}
.card .name{font-weight:600;font-size:.95rem;margin-bottom:2px}
.card .meta{color:var(--text2);font-size:.78rem;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.card .meta .booth{background:var(--accent2);color:var(--blue);padding:2px 8px;border-radius:6px;font-weight:600;font-size:.72rem}
.card .cat-tag{background:var(--card2);color:var(--text2);padding:2px 8px;border-radius:6px;font-size:.68rem;display:inline-block;margin-top:4px}
.card .actions{display:flex;gap:8px;margin-top:10px}
.card .actions button{flex:1;padding:8px;border-radius:10px;border:none;font-size:.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-scan{background:#1e3a5f;color:var(--blue)}
.btn-note{background:#1e3a2f;color:var(--green)}
.btn-flyer{background:#3a1e3f;color:#c084fc}
.btn-web{background:#3a2e1e;color:#fbbf24}

/* Category filter pills */
.cat-filters{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:wrap}
.cat-filters::-webkit-scrollbar{display:none}
.cat-filters button{flex-shrink:0;padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:.7rem;cursor:pointer}
.cat-filters button.active{background:var(--accent2);color:var(--blue);border-color:var(--blue)}

/* Schedule */
.sched-day{margin-bottom:16px}
.sched-day h3{padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.sched-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sched-item .time{flex-shrink:0;width:100px;color:var(--blue);font-size:.78rem;font-weight:600}
.sched-item .event{flex:1;font-size:.85rem}
.sched-item .loc{color:var(--text2);font-size:.72rem}

/* Scanner modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:420px;max-height:90vh;overflow-y:auto;padding:20px}
.modal h2{margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal .close-btn{background:none;border:none;color:var(--text2);font-size:1.5rem;cursor:pointer;padding:4px}
.modal label{display:block;color:var(--text2);font-size:.78rem;margin-bottom:4px;margin-top:12px}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9rem;outline:none}
.modal textarea{min-height:80px;resize:vertical}
.modal .save-btn{width:100%;padding:12px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:16px}
.modal .save-btn:active{opacity:.8}

/* Camera */
.camera-area{position:relative;background:#000;border-radius:10px;overflow:hidden;margin:10px 0;aspect-ratio:4/3}
.camera-area video{width:100%;height:100%;object-fit:cover}
.camera-area canvas{display:none}
.capture-btn{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);width:60px;height:60px;border-radius:50%;border:3px solid #fff;background:rgba(233,69,96,.8);cursor:pointer}
.capture-btn:active{background:var(--accent)}
.captured-img{width:100%;border-radius:10px;margin:10px 0}

/* Contacts log */
.contact-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.contact-card .type-badge{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block;margin-bottom:6px}
.type-bizcard{background:#1e3a5f;color:var(--blue)}
.type-flyer{background:#3a1e3f;color:#c084fc}
.type-note{background:#1e3a2f;color:var(--green)}
.contact-card .exhib{color:var(--text2);font-size:.75rem}
.contact-card .detail{font-size:.85rem;margin-top:4px}
.contact-card img{width:100%;border-radius:8px;margin-top:8px;max-height:200px;object-fit:cover}
.contact-card .delete-btn{background:none;border:none;color:#e94560;font-size:.72rem;cursor:pointer;margin-top:6px;padding:4px 0}

/* Export bar */
.export-bar{padding:10px 16px;display:flex;gap:8px}
.export-bar button{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav button{flex:1;padding:10px 0 8px;background:none;border:none;color:var(--text2);font-size:.65rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.bottom-nav button .ico{font-size:1.3rem}
.bottom-nav button.active{color:var(--accent)}
.bottom-nav button.active .ico{color:var(--accent)}

/* Visited badge */
.visited-badge{background:var(--green);color:#000;font-size:.6rem;padding:1px 6px;border-radius:8px;font-weight:700;margin-left:6px}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty .ico{font-size:3rem;margin-bottom:12px}

/* Count badge */
.count{font-size:.75rem;color:var(--text2);margin-bottom:10px}

/* Workshop card */
.workshop-card{background:var(--card2);border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid var(--blue)}
.workshop-card .time{color:var(--blue);font-size:.78rem;font-weight:600}
.workshop-card .session{font-size:.85rem;margin:4px 0}
.workshop-card .presenter{color:var(--text2);font-size:.75rem}

.section-title{padding:6px 0 10px;font-size:.9rem;font-weight:600;color:var(--accent)}
.hidden{display:none!important}

/* Star/favorite */
.star-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:2px}
.star-btn.starred{color:#fbbf24}
.star-btn:not(.starred){color:var(--border)}
</style>
</head>

<!-- Flyer Scanner Modal -->

      <canvas id="flyerCanvas"></canvas>
      <button class="capture-btn" id="flyerCaptureBtn"></button>
    </div>
    <img class="captured-img hidden" id="flyerPreview">
    <label>Title / Description</label>
    <input type="text" id="flyerTitle" placeholder="What is this?">
    <label>Notes</label>
    <textarea id="flyerNotes" placeholder="Key details, pricing, etc..."></textarea>
    <input type="hidden" id="flyerExhibitor">
    <input type="hidden" id="flyerImageData">
    <button class="save-btn" onclick="saveFlyer()">💾 Save Flyer</button>
  </div>
</div>

<!-- Notes Modal -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <h2>📝 Booth Notes <button class="close-btn" onclick="closeModal('noteModal')">&times;</button></h2>

    <input type="hidden" id="noteExhibitor">
    <button class="save-btn" onclick="saveNote()">💾 Save Note</button>
  </div>
</div>

// === DAY BADGE ===
function updateDayBadge(){
  const d = new Date();
  const day = d.getDate();
  const month = d.getMonth();
  if(month===2 && day===23) document.getElementById('dayBadge').textContent='DAY 1 — MON';
  else if(month===2 && day===24) document.getElementById('dayBadge').textContent='DAY 2 — TUE';
  else if(month===2 && day===25) document.getElementById('dayBadge').textContent='DAY 3 — WED';
  else document.getElementById('dayBadge').textContent='MAR 23-25';
}

// === RENDER ===
function render(){
  const c = document.getElementById('content');
  const sf = document.getElementById('searchWrap');
  const cf = document.getElementById('catFilters');
  const eb = document.getElementById('exportBar');
  
  sf.classList.toggle('hidden', currentTab!=='exhibitors');
  cf.classList.toggle('hidden', currentTab!=='exhibitors');
  eb.classList.toggle('hidden', currentTab!=='captures');

  if(currentTab==='exhibitors') renderExhibitors(c);
  else if(currentTab==='schedule') renderSchedule(c);
  else if(currentTab==='workshops') renderWorkshops(c);
  else if(currentTab==='captures') renderCaptures(c);
}

function renderExhibitors(c){
  let filtered = exhibitors;
  if(currentCat==='starred') filtered = exhibitors.filter(e=>stars[e.name]);
  else if(currentCat!=='all') filtered = exhibitors.filter(e=>e.cat===currentCat);
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(e=>e.name.toLowerCase().includes(q)||e.booth.toLowerCase().includes(q)||e.cat.toLowerCase().includes(q));
  }
  
  let html = `<div class="count">${filtered.length} exhibitor${filtered.length!==1?'s':''}</div>`;
  filtered.forEach(e=>{
    const hasCap = captures.some(cap=>cap.exhibitor===e.name);
    html += `<div class="card">
      <div style="display:flex;align-items:start;justify-content:space-between">
        <div>
          <div class="name">${e.name}${hasCap?'<span class="visited-badge">VISITED</span>':''}</div>
          <div class="meta">
            <span class="booth">Booth ${e.booth}</span>
            ${e.web?`<a href="https://${e.web}" target="_blank" style="color:var(--blue);font-size:.75rem;text-decoration:none">${e.web}</a>`:''}
          </div>
          <span class="cat-tag">${catLabels[e.cat]||e.cat}</span>
        </div>
        <button class="star-btn ${stars[e.name]?'starred':''}" onclick="toggleStar('${e.name.replace(/'/g,"\\'")}')">★</button>
      </div>
      <div class="actions">
        <button class="btn-scan" onclick="openScan('${e.name.replace(/'/g,"\\'")}')">📇 Card</button>
        <button class="btn-flyer" onclick="openFlyer('${e.name.replace(/'/g,"\\'")}')">📄 Flyer</button>
        <button class="btn-note" onclick="openNote('${e.name.replace(/'/g,"\\'")}')">📝 Note</button>
        ${e.web?`<button class="btn-web" onclick="window.open('https://${e.web}','_blank')">🌐</button>`:''}
      </div>
    </div>`;
  });
  if(filtered.length===0) html='<div class="empty"><div class="ico">🔍</div>No exhibitors found</div>';
  c.innerHTML = html;
}

function renderSchedule(c){
  let html = '';
  for(const[day,items] of Object.entries(schedule)){
    html += `<div class="sched-day"><h3>${day}</h3>`;
    items.forEach(i=>{
      const isFloor = i.event.includes('Show Floor');
      html += `<div class="sched-item" style="${isFloor?'background:rgba(0,184,148,.08);border-radius:8px;padding:8px;margin:4px 0':''}">
        <div class="time">${i.time}</div>
        <div><div class="event">${i.event}</div><div class="loc">${i.loc}</div></div>
      </div>`;
    });
    html += '</div>';
  }
  c.innerHTML = html;
}

function renderWorkshops(c){
  let html = '';
  for(const[track,items] of Object.entries(workshops)){
    html += `<div class="section-title">${track}</div>`;
    items.forEach(i=>{
      html += `<div class="workshop-card">
        <div class="time">${i.time}</div>
        <div class="session">${i.session}</div>
        <div class="presenter">${i.presenter}</div>
      </div>`;
    });
  }
  c.innerHTML = html;
}

function renderCaptures(c){
  if(captures.length===0){
    c.innerHTML = '<div class="empty"><div class="ico">📸</div>No captures yet<br><small style="color:var(--text2)">Scan business cards and flyers from exhibitor booths</small></div>';
    return;
  }
  let html = `<div class="count">${captures.length} capture${captures.length!==1?'s':''}</div>`;
  captures.slice().reverse().forEach((cap,idx)=>{
    const realIdx = captures.length-1-idx;
    const typeCls = cap.type==='card'?'type-bizcard':cap.type==='flyer'?'type-flyer':'type-note';
    const typeLabel = cap.type==='card'?'📇 Business Card':cap.type==='flyer'?'📄 Flyer':'📝 Note';
    html += `<div class="contact-card">
      <span class="type-badge ${typeCls}">${typeLabel}</span>
      <div class="exhib">${cap.exhibitor||'General'} · ${new Date(cap.ts).toLocaleString()}</div>`;
    if(cap.type==='card'){
      if(cap.name) html+=`<div class="detail"><strong>${cap.name}</strong></div>`;
      if(cap.company) html+=`<div class="detail">${cap.company}</div>`;
      if(cap.phone) html+=`<div class="detail">📞 <a href="tel:${cap.phone}" style="color:var(--blue)">${cap.phone}</a></div>`;
      if(cap.email) html+=`<div class="detail">✉️ <a href="mailto:${cap.email}" style="color:var(--blue)">${cap.email}</a></div>`;
      if(cap.notes) html+=`<div class="detail" style="color:var(--text2);margin-top:4px">${cap.notes}</div>`;
    } else if(cap.type==='flyer'){
      if(cap.title) html+=`<div class="detail"><strong>${cap.title}</strong></div>`;
      if(cap.notes) html+=`<div class="detail" style="color:var(--text2)">${cap.notes}</div>`;
    } else {
      if(cap.notes) html+=`<div class="detail">${cap.notes}</div>`;
    }
    if(cap.image) html+=`<img src="${cap.image}" alt="capture">`;
    html += `<button class="delete-btn" onclick="deleteCapture(${realIdx})">🗑 Delete</button></div>`;
  });
  c.innerHTML = html;
}

// === INTERACTIONS ===
function toggleStar(name){
  stars[name]=!stars[name];
  if(!stars[name]) delete stars[name];
  localStorage.setItem('awg_stars',JSON.stringify(stars));
  render();
}

function deleteCapture(idx){
  if(confirm('Delete this capture?')){
    captures.splice(idx,1);
    localStorage.setItem('awg_captures',JSON.stringify(captures));
    render();
  }
}

// === CAMERA ===
async function startCamera(videoEl){
  stopCamera();
  try{
    activeStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:960}},audio:false});
    videoEl.srcObject = activeStream;
  }catch(e){alert('Camera access needed to scan. Please allow camera permissions.')}
}

function stopCamera(){
  if(activeStream){activeStream.getTracks().forEach(t=>t.stop());activeStream=null}
}

function captureFrame(videoEl,canvasEl){
  canvasEl.width = videoEl.videoWidth;
  canvasEl.height = videoEl.videoHeight;
  canvasEl.getContext('2d').drawImage(videoEl,0,0);
  return canvasEl.toDataURL('image/jpeg',0.8);
}

  document.getElementById('noteExhibName').textContent = exhibName;
  const existing = captures.find(c=>c.type==='note'&&c.exhibitor===exhibName);
  document.getElementById('noteText').value = existing?existing.notes:'';
  document.getElementById('noteModal').classList.add('show');
}

function saveNote(){
  const exhib = document.getElementById('noteExhibitor').value;
  const text = document.getElementById('noteText').value;
  if(!text.trim()){closeModal('noteModal');return}
  const existIdx = captures.findIndex(c=>c.type==='note'&&c.exhibitor===exhib);
  if(existIdx>=0){captures[existIdx].notes=text;captures[existIdx].ts=Date.now()}
  else captures.push({type:'note',exhibitor:exhib,notes:text,ts:Date.now()});
  localStorage.setItem('awg_captures',JSON.stringify(captures));
  closeModal('noteModal');
  render();
}

// === MODALS ===
function closeModal(id){
  document.getElementById(id).classList.remove('show');
  stopCamera();
}

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el){closeModal(el.id)}});
});

// === EXPORT ===
function exportData(format){
  if(captures.length===0){alert('No captures to export');return}
  let content,mime,ext;
  if(format==='csv'){
    const rows=[['Type','Exhibitor','Name','Company','Phone','Email','Title','Notes','Timestamp']];
    captures.forEach(c=>rows.push([c.type,c.exhibitor||'',c.name||'',c.company||'',c.phone||'',c.email||'',c.title||'',c.notes||'',new Date(c.ts).toISOString()]));
    content=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    mime='text/csv';ext='csv';
  } else {
    content=JSON.stringify(captures,null,2);
    mime='application/json';ext='json';
  }
  const blob=new Blob([content],{type:mime});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`awg-showcase-captures.${ext}`;
  a.click();
}

// === NAV ===
function setTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav button, .bottom-nav button').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===tab);
  });
  render();
}

document.querySelectorAll('.nav button, .bottom-nav button').forEach(b=>{
  b.addEventListener('click',()=>setTab(b.dataset.tab));
});

document.querySelectorAll('.cat-filters button').forEach(b=>{
  b.addEventListener('click',()=>{
    currentCat=b.dataset.cat;
    document.querySelectorAll('.cat-filters button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render();
  });
});

document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value;
  render();
});

// Initial render
render();
</script>
</body>
</html>
